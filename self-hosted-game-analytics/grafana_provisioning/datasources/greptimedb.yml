apiVersion: 1

datasources:
  - name: GreptimeDB
    type: mysql
    uid: greptimedb-mysql
    url: greptimedb:4002
    database: public
    isDefault: true
    editable: true

  - name: GreptimeDB-Prometheus
    type: prometheus
    uid: greptimedb-prometheus
    url: http://greptimedb:4000/v1/prometheus
    isDefault: false
    editable: true
