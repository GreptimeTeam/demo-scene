receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  fluentforward:
    endpoint: 0.0.0.0:24224

processors:
  batch:
    timeout: 5s
    send_batch_size: 256

exporters:
  otlphttp/traces:
    endpoint: http://greptimedb:4000/v1/otlp
    headers:
      x-greptime-pipeline-name: greptime_trace_v1
    tls:
      insecure: true

  otlphttp/metrics:
    endpoint: http://greptimedb:4000/v1/otlp
    tls:
      insecure: true

  otlphttp/logs:
    endpoint: http://greptimedb:4000/v1/otlp
    headers:
      x-greptime-log-table-name: dify_logs
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/metrics, debug]
    logs:
      receivers: [otlp, fluentforward]
      processors: [batch]
      exporters: [otlphttp/logs, debug]
