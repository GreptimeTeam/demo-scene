include:
  - ../greptimedb-common.yml

services:
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.120.0
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      greptimedb:
        condition: service_healthy
    networks:
      - demo-network

  grafana:
    image: docker.io/grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: >-
        https://github.com/GreptimeTeam/greptimedb-grafana-datasource/releases/download/v2.0.7/info8fcc-greptimedb-datasource.zip;info8fcc-greptimedb-datasource
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "info8fcc-greptimedb-datasource"
    depends_on:
      greptimedb:
        condition: service_healthy
    networks:
      - demo-network

  # One-shot demo app — run with: docker compose run --rm app
  app:
    build: ./app
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: genai-demo
    depends_on:
      - otel-collector
    networks:
      - demo-network
    profiles:
      - app

  # Continuous load generator — activate with: docker compose --profile load up -d
  load-generator:
    build: ./load-generator
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: genai-demo
      RPS: ${RPS:-0.5}
    depends_on:
      - otel-collector
    networks:
      - demo-network
    profiles:
      - load

  # Optional: local Ollama — activate with: docker compose --profile local up -d
  ollama:
    image: ollama/ollama:0.17.7
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - demo-network
    profiles:
      - local

  # Create GreptimeDB Flow aggregations — auto-starts with load profile
  init-flow:
    image: docker.io/curlimages/curl:8.12.1
    volumes:
      - ./init-flow.sh:/init-flow.sh:ro
    entrypoint: ["/bin/sh", "/init-flow.sh"]
    environment:
      GREPTIME_URL: http://greptimedb:4000
    depends_on:
      greptimedb:
        condition: service_healthy
    networks:
      - demo-network
    restart: "no"
    profiles:
      - load

volumes:
  ollama-data:

networks:
  demo-network:
